<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <title>Zombie Mutant NFT</title>
    <meta name="description" content="Turn your Farcaster profile pic into a zombie mutant NFT. AI-powered horror art on Base." />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Zombie Mutant NFT 🧟" />

    <meta property="og:image" content="https://zombie-mutant-nft.vercel.app/hero.png" />

    <!-- Farcaster Mini App Embed -->

    <meta name="fc:frame" content='{"version":"1","imageUrl":"https://zombie-mutant-nft.vercel.app/hero.png","button":{"title":"Become a Mutant 🧟","action":{"type":"launch_frame","name":"Zombie Mutant NFT","url":"https://zombie-mutant-nft.vercel.app","splashImageUrl":"https://zombie-mutant-nft.vercel.app/icon.png","splashBackgroundColor":"#0a0a0a"}}}' />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

      :root {
        --bg: #09090b;
        --bg-elevated: #111113;
        --card: rgba(18, 18, 22, 0.8);
        --card-border: rgba(255, 255, 255, 0.06);
        --card-border-hover: rgba(255, 255, 255, 0.12);
        --text: #fafafa;
        --text-secondary: #a1a1aa;
        --text-muted: #52525b;
        --green: #22c55e;
        --green-glow: rgba(34, 197, 94, 0.4);
        --green-dim: rgba(34, 197, 94, 0.15);
        --red: #ef4444;
        --red-glow: rgba(239, 68, 68, 0.4);
        --purple: #a855f7;
        --purple-glow: rgba(168, 85, 247, 0.4);
        --gradient: linear-gradient(135deg, var(--green), var(--purple));
        --radius: 16px;
        --radius-sm: 12px;
        --radius-xs: 8px;
      }

      body {
        font-family: 'Inter', -apple-system, system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100dvh;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
      }

      /* ─── App Shell ─── */
      .app {
        max-width: 420px;
        margin: 0 auto;
        padding: 20px 16px;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        gap: 16px;
        position: relative;
      }

      /* ─── Ambient Glow ─── */
      .ambient-glow {
        position: fixed;
        top: -100px;
        left: 50%;
        transform: translateX(-50%);
        width: 400px;
        height: 400px;
        background: radial-gradient(circle, rgba(168, 85, 247, 0.08) 0%, transparent 70%);
        pointer-events: none;
        z-index: 0;
        animation: ambientPulse 8s ease-in-out infinite;
      }
      @keyframes ambientPulse {
        0%, 100% { opacity: 0.5; transform: translateX(-50%) scale(1); }
        50% { opacity: 1; transform: translateX(-50%) scale(1.1); }
      }

      /* ─── Header ─── */
      .header {
        text-align: center;
        padding: 24px 0 8px;
        position: relative;
        z-index: 1;
      }
      .header-icon {
        font-size: 2.5rem;
        margin-bottom: 8px;
        animation: float 3s ease-in-out infinite;
      }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-6px); }
      }
      .header h1 {
        font-size: 1.6rem;
        font-weight: 800;
        letter-spacing: -0.03em;
        background: var(--gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .header p {
        color: var(--text-secondary);
        font-size: 0.82rem;
        margin-top: 6px;
        font-weight: 400;
      }

      /* ─── Steps ─── */
      .steps {
        display: flex;
        gap: 6px;
        justify-content: center;
        padding: 4px 0;
      }
      .step {
        width: 32px;
        height: 4px;
        border-radius: 2px;
        background: var(--card-border);
        transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .step.active {
        background: var(--green);
        box-shadow: 0 0 12px var(--green-glow);
        width: 48px;
      }
      .step.done {
        background: var(--purple);
        box-shadow: 0 0 8px var(--purple-glow);
      }

      /* ─── Glass Card ─── */
      .glass-card {
        background: var(--card);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--card-border);
        border-radius: var(--radius);
        padding: 16px;
        transition: border-color 0.3s, box-shadow 0.3s;
      }
      .glass-card:hover {
        border-color: var(--card-border-hover);
      }

      /* ─── Gallery ─── */
      .gallery-section {
        position: relative;
        z-index: 1;
      }
      .gallery-label {
        font-size: 0.72rem;
        color: var(--text-muted);
        margin-bottom: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .gallery-scroll {
        display: flex;
        gap: 10px;
        overflow-x: auto;
        scroll-snap-type: x mandatory;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        padding: 4px 0;
        margin: 0 -4px;
        padding-left: 4px;
        padding-right: 4px;
      }
      .gallery-scroll::-webkit-scrollbar { display: none; }
      .gallery-card {
        flex: 0 0 auto;
        width: 130px;
        height: 130px;
        border-radius: var(--radius-sm);
        overflow: hidden;
        scroll-snap-align: start;
        border: 1px solid var(--card-border);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
      }
      .gallery-card::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, transparent 60%, rgba(0,0,0,0.6));
        opacity: 0;
        transition: opacity 0.3s;
      }
      .gallery-card:hover {
        border-color: var(--green);
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(0,0,0,0.4), 0 0 0 1px var(--green-dim);
      }
      .gallery-card:hover::after { opacity: 1; }
      .gallery-card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.5s;
      }
      .gallery-card:hover img { transform: scale(1.05); }

      /* ─── User Card ─── */
      .user-card {
        display: flex;
        align-items: center;
        gap: 14px;
        animation: slideUp 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      }
      @keyframes slideUp {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .user-card .avatar-wrap {
        position: relative;
        width: 52px;
        height: 52px;
        flex-shrink: 0;
      }
      .user-card .avatar {
        width: 52px;
        height: 52px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid var(--green);
        box-shadow: 0 0 16px var(--green-glow);
      }
      .user-card .avatar-ring {
        position: absolute;
        inset: -3px;
        border-radius: 50%;
        border: 2px solid transparent;
        border-top-color: var(--purple);
        animation: spin 3s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .user-card .user-info { flex: 1; min-width: 0; }
      .user-card .username {
        font-weight: 700;
        font-size: 1rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .user-card .fid {
        color: var(--text-muted);
        font-size: 0.75rem;
        margin-top: 2px;
      }

      /* ─── Preview Area ─── */
      .preview-area {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        min-height: 220px;
        justify-content: center;
      }
      .preview-placeholder {
        color: var(--text-muted);
        font-size: 0.85rem;
        text-align: center;
        line-height: 1.6;
      }
      .preview-placeholder .emoji-big {
        font-size: 2.5rem;
        display: block;
        margin-bottom: 8px;
      }
      .preview-images {
        display: flex;
        gap: 12px;
        align-items: center;
        justify-content: center;
        width: 100%;
        animation: fadeIn 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
      }
      .img-box {
        flex: 1;
        text-align: center;
        max-width: 160px;
      }
      .img-box img {
        width: 100%;
        aspect-ratio: 1;
        object-fit: cover;
        border-radius: var(--radius-sm);
        border: 2px solid var(--card-border);
        transition: all 0.3s;
      }
      .img-box.mutant img {
        border-color: var(--green);
        box-shadow: 0 0 20px var(--green-glow), 0 8px 32px rgba(0,0,0,0.3);
      }
      .img-box.mutant img[src*="mystery-box"] {
        border-color: var(--purple);
        box-shadow: 0 0 20px var(--purple-glow), 0 8px 32px rgba(0,0,0,0.3);
        object-fit: cover;
      }
      .img-box .label {
        font-size: 0.7rem;
        color: var(--text-muted);
        margin-top: 8px;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .arrow-divider {
        font-size: 1.2rem;
        flex-shrink: 0;
        color: var(--text-muted);
        animation: arrowPulse 2s ease-in-out infinite;
      }
      @keyframes arrowPulse {
        0%, 100% { opacity: 0.4; transform: translateX(0); }
        50% { opacity: 1; transform: translateX(4px); }
      }

      /* ─── Loading ─── */
      .loading-overlay {
        display: none;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        padding: 24px;
      }
      .loading-overlay.active { display: flex; }

      .spinner-ring {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        border: 3px solid var(--card-border);
        border-top-color: var(--green);
        border-right-color: var(--purple);
        animation: spin 1s linear infinite;
        box-shadow: 0 0 20px var(--green-glow);
      }
      .loading-text {
        color: var(--text-secondary);
        font-size: 0.82rem;
        font-weight: 500;
      }
      .loading-dots::after {
        content: '';
        animation: dots 1.5s steps(4) infinite;
      }
      @keyframes dots {
        0% { content: ''; }
        25% { content: '.'; }
        50% { content: '..'; }
        75% { content: '...'; }
      }

      /* ─── Buttons ─── */
      .actions {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .btn {
        width: 100%;
        padding: 16px;
        border: none;
        border-radius: var(--radius-sm);
        font-family: inherit;
        font-size: 0.92rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
        overflow: hidden;
        letter-spacing: -0.01em;
      }
      .btn:disabled {
        opacity: 0.35;
        cursor: not-allowed;
        transform: none !important;
      }
      .btn::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, transparent 100%);
        opacity: 0;
        transition: opacity 0.3s;
      }
      .btn:hover::before { opacity: 1; }

      .btn-primary {
        background: var(--gradient);
        color: #000;
        box-shadow: 0 4px 16px var(--green-glow);
      }
      .btn-primary:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 8px 28px var(--green-glow);
      }
      .btn-primary:active:not(:disabled) {
        transform: translateY(0);
      }

      .btn-mint {
        background: linear-gradient(135deg, var(--purple), var(--green));
        color: #000;
        box-shadow: 0 4px 16px var(--purple-glow);
      }
      .btn-mint:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 8px 28px var(--purple-glow);
      }

      .btn-secondary {
        background: var(--card);
        color: var(--text);
        border: 1px solid var(--card-border);
        backdrop-filter: blur(10px);
      }
      .btn-secondary:hover:not(:disabled) {
        border-color: var(--green);
        box-shadow: 0 0 0 1px var(--green-dim);
        transform: translateY(-1px);
      }

      /* ─── Status Bar ─── */
      .status-bar {
        padding: 12px 16px;
        border-radius: var(--radius-xs);
        font-size: 0.78rem;
        text-align: center;
        font-weight: 500;
        border: 1px solid var(--card-border);
        background: var(--card);
        backdrop-filter: blur(10px);
        color: var(--text-muted);
        transition: all 0.3s;
      }
      .status-bar.success {
        border-color: var(--green-dim);
        color: var(--green);
        background: rgba(34, 197, 94, 0.05);
      }
      .status-bar.error {
        border-color: rgba(239, 68, 68, 0.2);
        color: var(--red);
        background: rgba(239, 68, 68, 0.05);
      }

      /* ─── Footer ─── */
      .footer {
        margin-top: auto;
        text-align: center;
        padding: 16px 0 8px;
        color: var(--text-muted);
        font-size: 0.68rem;
        letter-spacing: 0.02em;
      }
      .footer a {
        color: var(--green);
        text-decoration: none;
        transition: opacity 0.2s;
      }
      .footer a:hover { opacity: 0.7; }

      /* ─── Scroll hint ─── */
      .scroll-hint {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        color: var(--text-muted);
        font-size: 0.68rem;
        padding: 4px 0;
      }
      .scroll-hint svg {
        width: 14px;
        height: 14px;
        animation: swipeHint 2s ease-in-out infinite;
      }
      @keyframes swipeHint {
        0%, 100% { transform: translateX(0); opacity: 0.4; }
        50% { transform: translateX(6px); opacity: 1; }
      }

      /* ─── Responsive ─── */
      @media (max-width: 360px) {
        .gallery-card { width: 110px; height: 110px; }
        .header h1 { font-size: 1.4rem; }
      }
    </style>
  </head>
  <body>
    <div class="ambient-glow"></div>
    <div class="app">
      <!-- Header -->
      <div class="header">
        <div class="header-icon">🧟</div>
        <h1>Zombie Mutant NFT</h1>
        <p>Your Farcaster pfp, reimagined in undead horror</p>
      </div>

      <!-- Steps -->
      <div class="steps">
        <div class="step active" id="step-1"></div>
        <div class="step" id="step-2"></div>
        <div class="step" id="step-3"></div>
        <div class="step" id="step-4"></div>
      </div>

      <!-- Gallery -->
      <div class="gallery-section glass-card">
        <div class="gallery-label">Mutant Previews</div>
        <div class="gallery-scroll" id="gallery">
          <div class="gallery-card"><img src="/preview1.jpg" alt="Zombie Boy" loading="lazy" /></div>
          <div class="gallery-card"><img src="/preview2.jpg" alt="Zombie Bear" loading="lazy" /></div>
          <div class="gallery-card"><img src="/preview3.jpg" alt="Zombie Croc" loading="lazy" /></div>
          <div class="gallery-card"><img src="/preview4.jpg" alt="Zombie Monkey" loading="lazy" /></div>
        </div>
        <div class="scroll-hint">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          <span>Swipe to explore</span>
        </div>
      </div>

      <!-- User Card -->
      <div class="user-card glass-card" id="user-card" style="display:none">
        <div class="avatar-wrap">
          <img class="avatar" id="user-avatar" src="" alt="avatar" />
          <div class="avatar-ring"></div>
        </div>
        <div class="user-info">
          <div class="username" id="user-name">Loading...</div>
          <div class="fid" id="user-fid">FID: —</div>
        </div>
      </div>

      <!-- Preview -->
      <div class="glass-card">
        <div class="preview-area" id="preview-area">
          <!-- Before login -->
          <div class="preview-placeholder" id="preview-placeholder">
            <img src="/mystery-box.jpg" alt="Mystery Box" style="width:100px;height:100px;border-radius:12px;margin-bottom:8px;" />
            <span style="color:var(--text-muted);font-size:0.8rem;">Open in Farcaster to unlock</span>
          </div>
          <!-- After login: show original → mystery box / mutant -->
          <div class="preview-images" id="preview-images" style="display:none">
            <div class="img-box">
              <img id="img-original" src="" alt="Original" />
              <div class="label">ORIGINAL</div>
            </div>
            <div class="arrow-divider">→</div>
            <div class="img-box mutant">
              <img id="img-mutant" src="/mystery-box.jpg" alt="Mutant" />
              <div class="label">MUTANT 🧟</div>
            </div>
          </div>
          <!-- Loading state -->
          <div class="loading-overlay" id="loading">
            <div class="spinner-ring"></div>
            <div class="loading-text" id="loading-text">Transforming...<span class="loading-dots"></span></div>
          </div>
        </div>
      </div>

      <!-- Actions -->
      <div class="actions">
        <button class="btn btn-primary" id="btn-generate" disabled>
          Generate Mutant 🧟 — $0.1
        </button>
        <button class="btn btn-mint" id="btn-mint" style="display:none">
          Mint as NFT 🪙 — $0.1
        </button>
        <button class="btn btn-secondary" id="btn-share" style="display:none">
          Share on Farcaster 📤
        </button>
      </div>

      <!-- Status -->
      <div class="status-bar" id="status">
        Waiting for Farcaster context...
      </div>

      <!-- Footer -->
      <div class="footer">
        Built on Base · Powered by AI · Zombie Mutant NFT
      </div>
    </div>

    <script src="/farcaster-sdk-init.js"></script>
    <script type="module" src="/src/app.js"></script>
  </body>
</html>
